<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBG Admin - Secure Login</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --green: #10b981; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; text-align: center; border-top: 4px solid var(--blue); }
        .login-box h2 { margin-top: 0; color: var(--blue); letter-spacing: 2px; }
        .login-box p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        
        input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 20px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .login-btn { background: var(--blue); color: var(--bg); width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: var(--green); color: white; }
        
        .error-msg { color: #ef4444; font-size: 13px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <p>Restricted Area. Authorized Access Only.</p>
        
        <p id="errorMsg" class="error-msg">Incorrect Username or Password!</p>

        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        
        <button class="login-btn" onclick="checkLogin()">Access Dashboard</button>
        
        <br><br>
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 13px;">← Back to Home</a>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Yahan aap apna secret Username aur Password set kar sakte hain
            const adminUser = "umar";
            const adminPass = "ubgadminhouse"; 

            if (user === adminUser && pass === adminPass) {
                // Agar password theek hai, toh browser ko batao ke Admin aa gaya hai
                sessionStorage.setItem("ubg_secure_login", "true");
                window.location.href = "dashboard.html"; // Dashboard par bhej do
            } else {
                // Agar password galat hai toh error dikhao
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
