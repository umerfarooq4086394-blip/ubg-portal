<!-- Mobile/Apple Icon -->
<link rel="apple-touch-icon" href="logo.png">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UBG | Master Command Center</title>
    <style>
        :root { --bg: #0b0f1a; --panel: #161c2d; --blue: #3b82f6; --red: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e2e8f0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--panel); position: fixed; padding: 30px; border-right: 1px solid #2d3748; }
        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .card { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #2d3748; margin-bottom: 30px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #0f172a; border: 1px solid #2d3748; color: white; border-radius: 10px; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .item-row { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .dl-stat { font-size: 11px; background: #1e293b; color: var(--blue); padding: 3px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--blue)">UBG MASTER</h2>
        <p style="font-size:12px; color:#475569;">Admin: Umar Farooq</p>
        <hr style="border:0; border-top:1px solid #2d3748; margin:20px 0;">
        <a href="index.html" style="color:#94a3b8; text-decoration:none;">🏠 View Live Portal</a><br><br>
        <a href="#" onclick="sessionStorage.clear(); window.location.href='index.html';" style="color:var(--red); text-decoration:none;">Logout</a>
    </div>

    <div class="main">
        <h1>Control Dashboard</h1>

        <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:30px;">
            <!-- Management Column -->
            <div>
                <div class="card">
                    <h3 id="formTitle">🚀 Publish Project</h3>
                    <input type="hidden" id="editIdx" value="-1">
                    <input type="text" id="t" placeholder="Game Name">
                    <select id="c">
                        <option value="Action">Action</option>
                        <option value="Open World">Open World</option>
                        <option value="Racing">Racing</option>
                        <option value="Simulation">Simulation</option>
                    </select>
                    <input type="file" id="f" accept="image/*">
                    <textarea id="d" rows="3" placeholder="Game Description"></textarea>
                    <button class="btn" onclick="save()">DEPLOY TO PORTAL</button>
                    <button class="btn" id="cancelBtn" style="background:#4b5563; display:none;" onclick="location.reload()">CANCEL</button>
                </div>

                <div class="card">
                    <h3>📂 Live Inventory & Stats</h3>
                    <div id="invList"></div>
                </div>
            </div>

            <!-- Feedback Column -->
            <div class="card">
                <h3>📩 Player Inbox</h3>
                <div id="inboxList"></div>
            </div>
        </div>
    </div>

    <script>
        if(sessionStorage.getItem("ubg_secure_login") !== "true") window.location.href = "login.html";

        function save() {
            const title = document.getElementById('t').value, 
                  desc = document.getElementById('d').value,
                  cat = document.getElementById('c').value,
                  file = document.getElementById('f').files[0],
                  eIdx = parseInt(document.getElementById('editIdx').value);

            if(!title || !desc) return alert("Fill mandatory fields!");
            let games = JSON.parse(localStorage.getItem('ubg_games')) || [];

            const handle = (imgData) => {
                if(eIdx === -1) {
                    games.push({ id: 'G-'+Date.now(), title, category: cat, description: desc, image: imgData, downloads: 0 });
                } else {
                    games[eIdx].title = title;
                    games[eIdx].category = cat;
                    games[eIdx].description = desc;
                    if(imgData) games[eIdx].image = imgData;
                }
                localStorage.setItem('ubg_games', JSON.stringify(games));
                location.reload();
            };

            if(file) {
                const r = new FileReader(); r.onload = (e) => handle(e.target.result); r.readAsDataURL(file);
            } else handle(eIdx === -1 ? null : games[eIdx].image);
        }

        function renderAdmin() {
            const games = JSON.parse(localStorage.getItem('ubg_games')) || [];
            document.getElementById('invList').innerHTML = games.map((g, i) => `
                <div class="item-row">
                    <div>
                        <strong>${g.title}</strong> <span class="dl-stat">📥 ${g.downloads || 0}</span><br>
                        <small style="color:#64748b;">Category: ${g.category}</small>
                    </div>
                    <div>
                        <button onclick="editG(${i})" style="color:var(--blue); border:none; background:none; cursor:pointer;">Edit</button>
                        <button onclick="delG(${i})" style="color:var(--red); border:none; background:none; cursor:pointer; margin-left:10px;">Del</button>
                    </div>
                </div>
            `).join('');

            const inbox = JSON.parse(localStorage.getItem('ubg_inbox')) || [];
            document.getElementById('inboxList').innerHTML = inbox.map((m, i) => `
                <div class="item-row" style="flex-direction:column; align-items:flex-start;">
                    <div style="width:100%; display:flex; justify-content:space-between;">
                        <strong style="color:var(--blue)">${m.name}</strong>
                        <button onclick="delM(${i})" style="color:var(--red); border:none; background:none; cursor:pointer;">✕</button>
                    </div>
                    <p style="font-size:13px; color:#94a3b8; margin:5px 0 0 0;">${m.message}</p>
                </div>
            `).join('');
        }

        window.editG = (i) => {
            const g = JSON.parse(localStorage.getItem('ubg_games'))[i];
            document.getElementById('t').value = g.title; document.getElementById('d').value = g.description;
            document.getElementById('c').value = g.category; document.getElementById('editIdx').value = i;
            document.getElementById('formTitle').innerText = "📝 Edit Game Details";
            document.getElementById('cancelBtn').style.display = "inline";
        };

        window.delG = (i) => { if(confirm("Remove from Portal?")) { let g = JSON.parse(localStorage.getItem('ubg_games')); g.splice(i,1); localStorage.setItem('ubg_games', JSON.stringify(g)); renderAdmin(); }};
        window.delM = (i) => { let inbox = JSON.parse(localStorage.getItem('ubg_inbox')); inbox.splice(i,1); localStorage.setItem('ubg_inbox', JSON.stringify(inbox)); renderAdmin(); };

        window.onload = renderAdmin;
    </script>
</body>
</html>
