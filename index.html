<!-- Is code mein bhi wahi URL aur Key dalni hai jo oper di gayi hai -->
<script>
    const SUPABASE_URL = 'YAHAN_APNA_URL_PASTE_KAREIN'; 
    const SUPABASE_KEY = 'YAHAN_APNI_ANON_KEY_PASTE_KAREIN';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchGames() {
        const { data: games, error } = await supabase.from('games').select('*').order('created_at', { ascending: false });
        
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '';

        if (games) {
            games.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <img src="${game.image_url}" alt="${game.title}">
                        <h3>${game.title}</h3>
                        <p>${game.category}</p>
                        <a href="${game.download_url}" target="_blank">Play Now</a>
                    </div>
                `;
            });
        }
    }
    fetchGames();
</script>
