<!-- Browser Tab Icon (Favicon) -->
<link rel="icon" type="image/png" href="logo.png">
<!-- Mobile/Apple Icon -->
<link rel="apple-touch-icon" href="logo.png">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBG STUDIO | Project Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #38bdf8; --bg: #020617; --panel: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--primary); }
        .admin-link { text-decoration: none; color: #94a3b8; font-size: 12px; border: 1px solid #334155; padding: 8px 20px; border-radius: 50px; transition: 0.3s; }
        .admin-link:hover { border-color: var(--primary); color: var(--primary); }

        /* Hero & Search Area */
        .hero { padding: 60px 20px; text-align: center; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .hero h1 { font-family: 'Orbitron'; font-size: 3rem; margin-bottom: 20px; }
        
        .search-box { max-width: 600px; margin: 0 auto 30px; position: relative; }
        .search-box input { width: 100%; padding: 15px 25px; border-radius: 50px; background: #0f172a; border: 1px solid var(--glass); color: white; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

        .filter-wrap { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .f-btn { background: #0f172a; border: 1px solid var(--glass); color: #94a3b8; padding: 8px 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .f-btn.active, .f-btn:hover { background: var(--primary); color: #020617; border-color: var(--primary); font-weight: 600; }

        /* Grid */
        .container { max-width: 1300px; margin: auto; padding: 0 40px 100px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }
        
        .game-card { background: var(--panel); border-radius: 24px; padding: 20px; border: 1px solid var(--glass); transition: 0.4s; position: relative; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .img-box { width: 100%; height: 200px; border-radius: 16px; overflow: hidden; margin-bottom: 15px; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .game-card:hover .img-box img { transform: scale(1.1); }
        
        .cat-tag { font-size: 10px; background: var(--primary); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .dl-badge { font-size: 12px; color: #94a3b8; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 8px; display: inline-block; margin: 10px 0; }
        
        .dl-btn { width: 100%; background: var(--primary); color: #020617; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .dl-btn:hover { filter: brightness(1.1); }

        .empty { grid-column: 1/-1; text-align: center; padding: 100px; border: 2px dashed #1e293b; border-radius: 30px; color: #475569; }

        /* Comment System */
        .float-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); border: none; border-radius: 50%; color: white; font-size: 24px; cursor: pointer; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .side-panel { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #0f172a; border-left: 1px solid var(--glass); transition: 0.5s; z-index: 2001; padding: 30px; box-shadow: -20px 0 40px rgba(0,0,0,0.6); }
        .input-ui { width: 100%; padding: 12px; margin-bottom: 15px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; font-family: inherit; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">UBG<span>.</span>STUDIO</div>
        <a href="login.html" class="admin-link">ADMIN ACCESS</a>
    </nav>

    <div class="hero">
        <h1>PROJECT ARCHIVE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for games..." oninput="filterAll()">
        </div>
        <div class="filter-wrap">
            <button class="f-btn active" onclick="setFilter('All')">All</button>
            <button class="f-btn" onclick="setFilter('Action')">Action</button>
            <button class="f-btn" onclick="setFilter('Open World')">Open World</button>
            <button class="f-btn" onclick="setFilter('Racing')">Racing</button>
            <button class="f-btn" onclick="setFilter('Simulation')">Simulation</button>
        </div>
    </div>

    <main class="container">
        <div class="game-grid" id="gameGrid"></div>
    </main>

    <!-- Feedback System -->
    <button class="float-btn" onclick="togglePanel()">💬</button>
    <div id="sidePanel" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="font-family:'Orbitron'; color:var(--primary);">COMMUNITY</h3>
            <button onclick="togglePanel()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <input type="text" id="cName" class="input-ui" placeholder="Your Name">
        <textarea id="cMsg" class="input-ui" rows="4" placeholder="Feedback..."></textarea>
        <button onclick="sendMsg()" class="dl-btn">SEND REVIEW</button>
        <div id="sideList" style="margin-top:25px; overflow-y:auto; height:calc(100% - 320px);"></div>
    </div>

    <script>
        let currentCat = 'All';

        function setFilter(cat) {
            currentCat = cat;
            document.querySelectorAll('.f-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText === cat) b.classList.add('active');
            });
            filterAll();
        }

        function filterAll() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const games = JSON.parse(localStorage.getItem('ubg_games')) || [];
            const grid = document.getElementById('gameGrid');

            const filtered = games.filter(g => {
                const matchesSearch = g.title.toLowerCase().includes(query);
                const matchesCat = (currentCat === 'All' || g.category === currentCat);
                return matchesSearch && matchesCat;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="empty"><h2>NO PROJECTS DEPLOYED</h2><p>Awaiting data from master server.</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(g => `
                <div class="game-card">
                    <div class="img-box"><img src="${g.image}"></div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>${g.title}</h3>
                        <span class="cat-tag">${g.category}</span>
                    </div>
                    <div class="dl-badge">📥 Downloads: <b>${g.downloads || 0}</b></div>
                    <p style="color:#94a3b8; font-size:13px; margin-bottom:15px; height:40px; overflow:hidden;">${g.description}</p>
                    <button class="dl-btn" onclick="doDl('${g.id}')">INITIATE DOWNLOAD</button>
                </div>
            `).join('');
        }

        function doDl(id) {
            let games = JSON.parse(localStorage.getItem('ubg_games'));
            const i = games.findIndex(x => x.id === id);
            if(i !== -1) {
                games[i].downloads = (games[i].downloads || 0) + 1;
                localStorage.setItem('ubg_games', JSON.stringify(games));
                filterAll();
                alert("Download Started!");
            }
        }

        function togglePanel() {
            const p = document.getElementById('sidePanel');
            p.style.right = p.style.right === "0px" ? "-400px" : "0px";
            if(p.style.right === "0px") loadFeed();
        }

        function sendMsg() {
            const n = document.getElementById('cName').value, m = document.getElementById('cMsg').value;
            if(!n || !m) return alert("Fill all fields!");
            const inbox = JSON.parse(localStorage.getItem('ubg_inbox')) || [];
            inbox.unshift({ name: n, message: m, time: new Date().toLocaleString() });
            localStorage.setItem('ubg_inbox', JSON.stringify(inbox));
            document.getElementById('cMsg').value = "";
            loadFeed();
            alert("Feedback sent!");
        }

        function loadFeed() {
            const inbox = JSON.parse(localStorage.getItem('ubg_inbox')) || [];
            document.getElementById('sideList').innerHTML = inbox.map(i => `
                <div style="background:#1f2937; padding:12px; border-radius:10px; margin-bottom:10px; font-size:13px;">
                    <strong style="color:var(--primary)">${i.name}</strong>
                    <p style="margin-top:5px; color:#cbd5e1;">${i.message}</p>
                </div>
            `).join('');
        }

        window.onload = filterAll;
    </script>
</body>
</html>
