        container.innerHTML = '';

        if (games) {
            games.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <img src="${game.image_url}" alt="${game.title}">
                        <h3>${game.title}</h3>
                        <p>${game.category}</p>
                        <a href="${game.download_url}" target="_blank">Play Now</a>
                    </div>
                `;
            });
        }
    }
